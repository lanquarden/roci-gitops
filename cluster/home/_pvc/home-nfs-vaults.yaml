---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: home-nfs-vaults-pv
spec:
  storageClassName: home-nfs-vaults
  capacity:
    storage: 1Mi
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: storone.lanquarden.com
    path: /mnt/bulk/vaults
  mountOptions:
  - nfsvers=4.1
  - tcp
  - intr
  - hard
  - noatime
  - nodiratime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home-nfs-vaults-pvc
  namespace: home
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: home-nfs-vaults
  resources:
    requests:
      storage: 1Mi
