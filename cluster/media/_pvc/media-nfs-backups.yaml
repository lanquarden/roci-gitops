---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-nfs-backups-pv
spec:
  storageClassName: media-nfs-backups
  capacity:
    storage: 1Mi
  accessModes:
  - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: storone.lanquarden.com
    path: /mnt/bulk/backups
  mountOptions:
  - nfsvers=4.1
  - tcp
  - intr
  - hard
  - noatime
  - nodiratime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-nfs-backups-pvc
  namespace: media
spec:
  accessModes:
  - ReadWriteMany
  storageClassName: media-nfs-backups
  resources:
    requests:
      storage: 1Mi
